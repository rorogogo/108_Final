<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Profile Settings</title>

    <style>
        * {
            font-family: 'Orbitron', sans-serif;
        }

        body {
            margin: 0;
            background: #ececec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .panel {
            background: white;
            padding: 30px;
            border: 3px solid #ffe100;
            width: 300px;
        }

        input {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #111;
            color: #ffe100;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div id="navigation-bar">
        <p id="logo">ENDFIELD</p>

            <div class="nav-item" onclick="location.href='/dashboard'">
                Dashboard
            </div>
            <div class="nav-item" onclick="location.href='/profile'">
                Profile Settings
            </div>
            <div style="margin-top:auto;">
                <div class="nav-item" style="border-left:4px solid #ff3b3b;" onclick="if(confirm('Logout?')) location.href='/logout'">
                    LOGOUT
                </div>
            </div>
    </div>
<div class="panel">
    <h2>Update Profile</h2>
    <input id="name-input" placeholder="Username">
    <input id="img-input" type="file" accept="image/*">
    <button onclick="saveProfile()">Save</button>
</div>

<script>
    let user = JSON.parse(localStorage.getItem("user")) || {
        name: "JohnEndfield",
        profilePic: "./static/image0.jpg"
    };
    document.getElementById("name-input").value = user.name;
    function saveProfile() {
        user.name = document.getElementById("name-input").value;
        const file = document.getElementById("img-input").files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                user.profilePic = e.target.result;
                localStorage.setItem("user", JSON.stringify(user));
                alert("Profile updated!");
            };
            reader.readAsDataURL(file);
        } else {
            localStorage.setItem("user", JSON.stringify(user));
            alert("Profile updated!");
        }
    }
</script>

</body>
</html>
