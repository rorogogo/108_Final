<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/sidebar.css">
    <title>Profile Settings</title>

    <style>
        * {
            font-family: 'Orbitron', sans-serif;
        }
        :root {
            --sidebar-width: 240px;
            --sidebar-collapsed: 70px;
        }
        #navigation-bar {
            box-sizing: border-box;
            left: 0;
            top: 0;
            position: fixed;
            width: var(--sidebar-width);
            height: 100%;
            background: #111;
            border-right: 4px solid #ffe100;
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            transition: 0.25s;
        }
        body.collapsed #navigation-bar {
            width: var(--sidebar-collapsed);
        }
        #logo {
            font-size: 30px;
            font-weight: 700;
            color: #ffe100;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }
        .nav-item {
            padding: 14px 18px;
            margin-bottom: 14px;
            background: #1d1d1d;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-item:hover {
            background: #272727;
        }
        body {
            margin: 0;
            margin-left: var(--sidebar-width);
            background: #ececec;
            min-height: 100vh;
            position: relative;
            transition: 0.25s;
        }
        body.collapsed {
            margin-left: var(--sidebar-collapsed);
        }
        .panel {
            background: white;
            padding: 30px;
            border: 3px solid #ffe100;
            width: 300px;
            position: absolute;
            top: 50%;
            left: calc(var(--sidebar-width) + 50%);
            transform: translate(-50%, -50%);
        }
        input {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #111;
            color: #ffe100;
            border: none;
            cursor: pointer;
        }
        #toggle-btn {
            width: 100%;
            font-size: 20px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div id="navigation-bar">
    <button id="toggle-btn" onclick="toggleSidebar()">☰</button>
        <p id="logo">ENDFIELD</p>

            <div class="nav-item" onclick="location.href='/dashboard'">
                <span class="nav-text">Dashboard</span>
            </div>
            <div class="nav-item" onclick="location.href='/profile'">
                <span class="nav-text">Profile Settings</span>
            </div>
            <div class="nav-item" onclick="location.href='/teams'">
                <span class="nav-text">Teams</span>
            </div>
            <div style="margin-top:auto;">
                <div class="nav-item" style="border-left:4px solid #ff3b3b;" onclick="if(confirm('Logout?')) location.href='/logout'">
                    LOGOUT
                </div>
            </div>
    </div>
<div class="panel">
    <h2>Update Profile</h2>
    <input id="name-input" placeholder="Username">
    <input id="img-input" type="file" accept="image/*">
    <button onclick="saveProfile()">Save</button>
</div>

<script>
    function saveProfile() {
        const name = document.getElementById("name-input").value;
        const file = document.getElementById("img-input").files[0];

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                sendToServer(name, e.target.result);
            };
            reader.readAsDataURL(file);
        } else {
            sendToServer(name, null);
        }
    }

    function sendToServer(name, profilePic) {
        fetch("/update-profile", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name: name,
                profilePic: profilePic
            })
        })
        .then(res => res.json())
        .then(() => {
            alert("Profile updated!");
            window.location.href = "/dashboard"; // reload with new data
        });
    }

    function toggleSidebar() {
        document.body.classList.toggle("collapsed");
    }

    let user = JSON.parse(localStorage.getItem("user")) || {
        name: "JohnEndfield",
        profilePic: "./static/image0.jpg"
    };
    document.getElementById("name-input").value = user.name;
</script>

</body>
</html>
