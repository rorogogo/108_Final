<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
    <script>window.ENDFIELD_SAVED_THEME = {{ saved_theme | tojson }};</script>
    <script src="/static/theme.js"></script>
    <link rel="stylesheet" href="/static/sidebar.css">
    <script src="/static/music.js" defer></script>
    <title>Endfield Profile</title>
</head>
<body data-logged-in="true" data-reset-chatbot="{{ 'true' if reset_chatbot_on_load else 'false' }}">
    <nav id="navigation-bar" aria-label="Primary navigation">
        <p id="logo">ENDFIELD</p>
        <a class="nav-item" href="/dashboard">
            <span class="nav-icon" aria-hidden="true">DB</span>
            <span class="nav-text">Dashboard</span>
        </a>
        <a class="nav-item" href="/teams">
            <span class="nav-icon" aria-hidden="true">TM</span>
            <span class="nav-text">Teams</span>
        </a>
        <a class="nav-item" href="/community-builds">
            <span class="nav-icon" aria-hidden="true">CB</span>
            <span class="nav-text">Community's Build</span>
        </a>
        <a class="nav-item" href="/weapons">
            <span class="nav-icon" aria-hidden="true">WP</span>
            <span class="nav-text">Weapons</span>
        </a>
        <a class="nav-item" href="/optimizer">
            <span class="nav-icon" aria-hidden="true">OP</span>
            <span class="nav-text">Character Optimizer</span>
        </a>
        <a class="nav-item" href="/relics">
            <span class="nav-icon" aria-hidden="true">RL</span>
            <span class="nav-text">Relics</span>
        </a>
        <a class="nav-item" href="/resources">
            <span class="nav-icon" aria-hidden="true">RS</span>
            <span class="nav-text">Resources</span>
        </a>
    </nav>

    <main class="shell">
        <header class="page-header">
            <div>
                <p class="page-kicker">Operator Profile</p>
                <h1 class="page-title">{{ user.username }}</h1>
            </div>
            <div class="account-menu" id="account-menu">
                <button
                    class="avatar-button"
                    type="button"
                    id="account-menu-button"
                    aria-label="Open account menu"
                    aria-expanded="false"
                    onclick="toggleAccountMenu(event)"
                >
                    <img class="avatar" id="preview" src="{{ user.profile_pic or '/static/image0.jpg' }}" alt="Profile picture">
                </button>
                <div class="account-popover" id="account-popover" role="menu" aria-labelledby="account-menu-button">
                    <div class="account-summary">
                        <img class="account-avatar" id="menu-preview" src="{{ user.profile_pic or '/static/image0.jpg' }}" alt="">
                        <div>
                            <strong>{{ user.username }}</strong>
                            <span>Account</span>
                        </div>
                    </div>
                    <a class="account-action" href="/profile" role="menuitem">Account Settings</a>
                    <a class="account-action danger" href="/logout" role="menuitem" onclick="resetSiteDefaults()">Logout</a>
                </div>
            </div>
        </header>

        <section class="content">
            <div class="settings-grid">
                <div class="panel profile-form">
                    <div class="field">
                        <label for="name-input">Username</label>
                        <input id="name-input" value="{{ user.username }}" maxlength="25" autocomplete="username">
                    </div>

                    <div class="field">
                        <label for="img-input">Profile image</label>
                        <input id="img-input" type="file" accept="image/*">
                    </div>

                    <div class="theme-setting">
                        <div class="theme-setting-text">
                            <strong>Dark mode</strong>
                            <span>Switch the site to a darker moonlit theme.</span>
                        </div>
                        <label class="theme-switch" aria-label="Dark mode">
                            <input id="dark-mode-input" type="checkbox" onchange="toggleDarkMode(); markProfileChanged();">
                            <span class="theme-slider" aria-hidden="true"></span>
                        </label>
                    </div>

                    <div class="field">
                        <label for="build-input">Bio</label>
                        <textarea id="build-input" rows="7" placeholder="Enter text here.">{{ user.build_data or '' }}</textarea>
                    </div>

                    <button class="primary-button" id="profile-save-button" type="button" onclick="saveProfile()">Save</button>
                </div>

                <form class="panel profile-form" id="password-form" onsubmit="changePassword(event)">
                    <h2 class="settings-title">Change password</h2>
                    <div class="field">
                        <label for="old-password-input">Old password</label>
                        <input id="old-password-input" type="password" autocomplete="current-password">
                    </div>
                    <div class="field">
                        <label for="new-password-input">New password</label>
                        <input id="new-password-input" type="password" autocomplete="new-password">
                    </div>
                    <div class="field">
                        <label for="confirm-password-input">Confirm new password</label>
                        <input id="confirm-password-input" type="password" autocomplete="new-password">
                    </div>
                    <button class="primary-button" type="submit">Update Password</button>
                    <p class="form-status" id="password-status" aria-live="polite"></p>
                </form>
            </div>
        </section>
    </main>

    <section class="chatbot-widget" id="chatbot-widget" aria-label="Character chatbot">
        <button class="chatbot-launcher" type="button" onclick="toggleChatbot()" aria-expanded="false" id="chatbot-launcher">
            BOT
        </button>
        <div class="chatbot-panel" id="chatbot-panel">
            <div class="chatbot-header">
                <strong>Build Bot</strong>
                <button class="chatbot-close" type="button" onclick="toggleChatbot(false)" aria-label="Close chatbot">X</button>
            </div>
            <div class="chatbot-messages" id="chatbot-messages"></div>
            <form class="chatbot-form" onsubmit="sendChatbotMessage(event)">
                <input id="chatbot-input" autocomplete="off" placeholder="Message">
                <button class="primary-button" type="submit">Send</button>
            </form>
        </div>
    </section>

    <button
        class="sound-toggle floating-mute"
        id="sound-muted-button"
        type="button"
        aria-label="Mute audio"
        aria-pressed="false"
        title="Mute audio"
    >
        <span class="speaker-icon" id="sound-muted-icon" aria-hidden="true"></span>
    </button>

    <script>
        let selectedImage = null;

        function markProfileChanged() {
            const button = document.getElementById("profile-save-button");
            button.textContent = "Save";
            button.disabled = false;
        }

        function setAccountMenu(open) {
            const menu = document.getElementById("account-menu");
            const button = document.getElementById("account-menu-button");
            menu.classList.toggle("open", open);
            button.setAttribute("aria-expanded", open ? "true" : "false");
        }

        function toggleAccountMenu(event) {
            event.stopPropagation();
            const menu = document.getElementById("account-menu");
            setAccountMenu(!menu.classList.contains("open"));
        }

        document.getElementById("img-input").addEventListener("change", (event) => {
            const file = event.target.files[0];
            if (!file) {
                selectedImage = null;
                return;
            }

            const reader = new FileReader();
            reader.onload = (loadEvent) => {
                selectedImage = loadEvent.target.result;
                document.getElementById("preview").src = selectedImage;
                document.getElementById("menu-preview").src = selectedImage;
                markProfileChanged();
            };
            reader.readAsDataURL(file);
        });

        document.getElementById("name-input").addEventListener("input", markProfileChanged);
        document.getElementById("build-input").addEventListener("input", markProfileChanged);

        function saveProfile() {
            const button = document.getElementById("profile-save-button");
            button.disabled = true;
            fetch("/update-profile", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: document.getElementById("name-input").value,
                    profilePic: selectedImage,
                    buildData: document.getElementById("build-input").value,
                    theme: document.documentElement.dataset.theme === "dark" ? "dark" : "light"
                })
            }).then((response) => {
                if (!response.ok) {
                    throw new Error("Save failed");
                }
                window.ENDFIELD_SAVED_THEME = document.documentElement.dataset.theme === "dark" ? "dark" : "light";
                button.textContent = "Saved";
            }).catch(() => {
                button.textContent = "Save";
                button.disabled = false;
            });
        }

        function setPasswordStatus(message, type) {
            const status = document.getElementById("password-status");
            status.textContent = message;
            status.className = `form-status ${type || ""}`;
        }

        function changePassword(event) {
            event.preventDefault();
            setPasswordStatus("", "");

            fetch("/change-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    oldPassword: document.getElementById("old-password-input").value,
                    newPassword: document.getElementById("new-password-input").value,
                    confirmPassword: document.getElementById("confirm-password-input").value
                })
            }).then((response) => {
                return response.json().then((data) => {
                    if (!response.ok) {
                        throw new Error(data.error || "Could not update password.");
                    }
                    return data;
                });
            }).then((data) => {
                document.getElementById("password-form").reset();
                setPasswordStatus(data.message || "Password updated.", "success");
            }).catch((error) => {
                setPasswordStatus(error.message, "error");
            });
        }

        document.addEventListener("click", (event) => {
            if (!event.target.closest("#account-menu")) {
                setAccountMenu(false);
            }
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                setAccountMenu(false);
            }
        });
    </script>
    <script src="/static/sfx.js"></script>
    <script src="/static/chatbot.js"></script>
</body>
</html>
