<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/sidebar.css">
    <title>Teams</title>

    <style>
        * {
            font-family: 'Orbitron', sans-serif;
        }

        body {
            margin: 0;
            margin-left: var(--sidebar-width);
            background: #ececec;
            min-height: 100vh;
        }

        :root {
            --sidebar-width: 240px;
            --sidebar-collapsed: 70px;
        }

        .panel {
            background: white;
            border: 3px solid #ffe100;
            padding: 30px;
            margin: 40px;
        }

        button {
            padding: 10px;
            background: #111;
            color: #ffe100;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #222;
        }

        .team-box {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-left: 4px solid #ffe100;
        }
    </style>
</head>

<body>

<div id="navigation-bar">
    <button id="toggle-btn" onclick="toggleSidebar()">☰</button>
        <p id="logo">ENDFIELD</p>
            <div class="nav-item" onclick="location.href='/dashboard'">
                <span class="nav-text">Dashboard</span>
            </div>
            <div class="nav-item" onclick="location.href='/profile'">
                <span class="nav-text">Profile Settings</span>
            </div>
            <div class="nav-item" onclick="location.href='/teams'">
                <span class="nav-text">Teams</span>
            </div>
            <div style="margin-top:auto;">
                <div class="nav-item" style="border-left:4px solid #ff3b3b;" onclick="if(confirm('Logout?')) location.href='/logout'">
                    LOGOUT
                </div>
            </div>
    </div>
<div class="panel">
    <h2>Team Builder</h2>

    <button onclick="generateTeam()">Generate Best Team</button>

    <div id="result"></div>

</div>

<script>
function toggleSidebar() {
    document.body.classList.toggle("collapsed");
}

function generateTeam() {
    fetch("/generate-team", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        }
    })
    .then(res => res.json())
    .then(data => {
        const team = data.team;

        document.getElementById("result").innerHTML = `
            <div class="team-box">
                <h3>Recommended Team</h3>
                <p>${team.join(" • ")}</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
