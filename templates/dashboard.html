<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>

    <style>
    :root {
        --elementsize: 75px;
    }

    #navigation-bar {
        position: fixed;
        width: 15%;
        height: 100%;
        background: mediumseagreen;
        display: flex;
    }

    main {
        margin-left:15%;
        /*padding: 5px;*/
        /*display: flex;*/
        background-color: mediumorchid;
    }

    #profile {
        width:100%;
        background-color: slategray;
        padding: 5px;
    }
    #profile-pic {
        width: 100px;
        display: flex;
        clip-path: circle(50%);
        filter: grayscale(1);
    }

    .block {
        width: 100%;
        padding: 5px;
        display: grid;
        flex-wrap: wrap;
        grid-template-columns: repeat(auto-fill, var(--elementsize));
        justify-content: space-evenly;
        justify-items: center;
        background-color: blue;
    }
    .element {
        position: relative;
        display: inline-block;
        width: var(--elementsize);
        margin: 10px 8px 0 8px;
        vertical-align: text-top;
        background-color: red;
        transition: transform 0.22s;
        /*filter: grayscale(100%);*/
    }
    .element:hover {
        transform: scale(1.2);
        z-index: 10;
    }
    .char-icon {
        width: 100%;
        -webkit-user-drag: none;
        -webkit-user-select: none;
    }
    /*
    .char-icon {
        transition: transform 0.22s;
    }

        transform: scale(1.2);
        z-index: 10;
    }*/

    </style>
</head>
