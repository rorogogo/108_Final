<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>

    <style>
    :root {
        --elementsize: 150px;
        --elementsize2: calc(var(--elementsize) * 0.784974);
    }

    #navigation-bar {
        position: fixed;
        width: 14%;
        height: 100%;
        background: mediumseagreen;
        display: flex;
        z-index: 100;
    }

    main {
        margin-left:15%;
        right:0;
        /*padding: 5px;*/
        /*display: flex;*/
        background-color: mediumorchid;
    }

    #profile {
        width:100%;
        background-color: slategray;
        padding: 5px 0 0 0;
    }
    #profile-pic {
        width: 100px;
        display: flex;
        float: left;
        clip-path: circle(50%);
        /*filter: grayscale(1);*/
    }

    .block {
        position: relative;
        width: 100%;
        padding: 20px 0 20px 20px;
        left: -20px;
        display: grid;
        flex-wrap: wrap;
        grid-template-columns: repeat(auto-fill, var(--elementsize2));
        justify-content: space-evenly;
        justify-items: center;
        background-color: blue;
        overflow: hidden;
    }
    .element {
        position: relative;
        display: inline-block;
        height: var(--elementsize);
        margin: 8px 8px 8px 8px;
        vertical-align: text-top;
        /*background-color: lightskyblue;*/
        background-image: url('https://web-static.hg-cdn.com/endfield/official-v4/_next/static/media/card-bg.28c79684.jpg');
        background-size: cover;
        transition: transform 0.22s, filter 0.3s ease;
    }
    .element:hover {
        transform: scale(1.32);
        z-index: 10;
    }
    .element.grayscale {
        filter: grayscale(100%) brightness(75%);
    }
    .char-icon {
        height: var(--elementsize);
        -webkit-user-drag: none;
        -webkit-user-select: none;
    }

    /*
    .char-icon {
        transition: transform 0.22s;
    }
    .char-icon:hover {
        transform: scale(1.2);
        z-index: 10;
    }*/

    </style>
</head>

    <script>

        //this will eventually be replaced by getting the data from the database
        let data = //'{ "endmin" : false, "perlica" : true, "zhuangfy" : true, "chen" : false, "tangtang" : false, "rossi" : true, "laevatain" : false, "yvonne" : false, "gilberta" : true, "ardelia" : false, "ember" : false, "lastrite" : true, "lifeng" : true, "pogranichnik" : false, "alesh" : false, "arclight" : false, "avywenna" : false, "dapan" : true, "snowshine" : false, "wulfgard" : false, "xaihi" : false, "akekuri" : false, "antal" : false, "catcher" : false, "estella" : false, "flourite" : true }'
            '{"endmin":false,"perlica":true,"zhuangfy":true,"chen":false,"tangtang":false,"rossi":true,"laevatain":false,"yvonne":false,"gilberta":true,"ardelia":false,"ember":false,"lastrite":true,"lifeng":true,"pogranichnik":false,"alesh":false,"arclight":false,"avywenna":false,"dapan":true,"snowshine":false,"wulfgard":false,"xaihi":false,"akekuri":false,"antal":false,"catcher":false,"estella":false,"flourite":true}'
        let obj = JSON.parse(data);

        //goes through and selects / deselects chars based on saved data
        for(const [key, value] of Object.entries(obj).filter(([key]) => key !== 'endmin')) {
            console.log(key, value);
            if(!value) {
                const el = document.getElementById(key);
                el.classList.toggle('grayscale');
            }
        }

        //changes the character icon to grayscale + half brightness when deselected
        //also updates the object and plays a sound
        const select = (el) => {
            el.classList.toggle('grayscale');
            const sound = new Audio('./static/click.wav');
            sound.currentTime = 0;
            sound.play();
            obj[el.id] = !obj[el.id];
            //console.log(obj[el.id]);
        }

        //switches the endmin picture when clicked instead of deselecting them
        const selectspecial = (el) => {
            if(obj["endmin"]){
                el.innerHTML = '<img class="char-icon" alt="endmin" src="https://web-static.hg-cdn.com/endfield/official-v4/_next/static/media/endministrator1.c391b13d.png">';
                obj["endmin"] = false;
            }else{
                el.innerHTML = '<img class="char-icon" alt="endmin" src="https://web-static.hg-cdn.com/endfield/official-v4/_next/static/media/endministrator2.5ccb44a8.png">';
                obj["endmin"] = true;
            }
            const sound = new Audio('./static/click.wav');
            sound.currentTime = 0;
            sound.play();
        }

        //adding events for playing sound on click and hover
        const elements =
            document.querySelectorAll('.element:not(#special)');
        elements.forEach(el => {
            el.addEventListener('mouseover', playsound, false);
            el.addEventListener('click', () => select(el));
        });

        //special case for endmin; true = guy endmin, false = girl endmin
        obj["endmin"] = !obj["endmin"];
        const special = document.getElementById('special');
        selectspecial(special);
        special.addEventListener('mouseover', playsound, false);
        special.addEventListener('click', () => selectspecial(special));

        //plays sound when hovering over elements
        function playsound() {
            const sound = new Audio('./static/hover.wav');
            sound.currentTime = 0;
            sound.play();
            //console.log("done!");
        }

        //Update server with changes
        function update() {
            if(data !== JSON.stringify(obj)) {
                console.log("update():", true);
                data = JSON.stringify(obj);
                //update server with new data
                // TO BE ADDED
            }else{
                console.log("update():", false);
            }
        }

        //calls update every 5 seconds and when leaving the page
        setInterval(update, 5000);
        addEventListener("beforeunload", update);

    </script>
