<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>

    <style>
    :root {
        --elementsize: 150px;
        --elementsize2: calc(var(--elementsize) * 0.784974);
    }

    #navigation-bar {
        position: fixed;
        width: 14%;
        height: 100%;
        background: mediumseagreen;
        display: flex;
        z-index: 100;
    }

    main {
        margin-left:15%;
        right:0;
        /*padding: 5px;*/
        /*display: flex;*/
        background-color: mediumorchid;
    }

    #profile {
        width:100%;
        background-color: slategray;
        padding: 5px 0 0 0;
    }
    #profile-pic {
        width: 100px;
        display: flex;
        float: left;
        clip-path: circle(50%);
        /*filter: grayscale(1);*/
    }

    .block {
        position: relative;
        width: 100%;
        padding: 20px 0 20px 20px;
        left: -20px;
        display: grid;
        flex-wrap: wrap;
        grid-template-columns: repeat(auto-fill, var(--elementsize2));
        justify-content: space-evenly;
        justify-items: center;
        background-color: blue;
        overflow: hidden;
    }
    .element {
        position: relative;
        display: inline-block;
        height: var(--elementsize);
        margin: 8px 8px 8px 8px;
        vertical-align: text-top;
        /*background-color: lightskyblue;*/
        background-image: url('https://web-static.hg-cdn.com/endfield/official-v4/_next/static/media/card-bg.28c79684.jpg');
        background-size: cover;
        transition: transform 0.22s, filter 0.3s ease;
    }
    .element:hover {
        transform: scale(1.32);
        z-index: 10;
    }
    .element.grayscale {
        filter: grayscale(100%) brightness(75%);
    }
    .char-icon {
        height: var(--elementsize);
        -webkit-user-drag: none;
        -webkit-user-select: none;
    }

    /*
    .char-icon {
        transition: transform 0.22s;
    }

        z-index: 10;
    }*/

    </style>
</head>

    <script>

        /*const hover-sounds = [
            //new Audio('./hover1.wav'),
            new Audio('./hover2.wav'),
        ];*/

        const select = (el) => {
            el.classList.toggle('grayscale');
            const sound = new Audio('./click.wav');
            sound.currentTime = 0;
            sound.play();
        }

        const elements =
            document.querySelectorAll('.element:not(#special)');
        elements.forEach(el => {
            el.addEventListener('mouseover', playsound, false);
            el.addEventListener('click', () => select(el));
        });

        let isendminaguy = false;
        const special = document.getElementById('special');
        special.addEventListener('mouseover', playsound, false);
        special.addEventListener('click', () => {
            if(isendminaguy){
                special.innerHTML = '<img class="char-icon" alt="endmin" src="https://web-static.hg-cdn.com/endfield/official-v4/_next/static/media/endministrator1.c391b13d.png">';
                isendminaguy = false;
            }else{
                special.innerHTML = '<img class="char-icon" alt="endmin" src="https://web-static.hg-cdn.com/endfield/official-v4/_next/static/media/endministrator2.5ccb44a8.png">';
                isendminaguy = true;
            }
            const sound = new Audio('./click.wav');
            sound.currentTime = 0;
            sound.play();
        })


        function playsound() {
            const sound = new Audio('./hover.wav');
            sound.currentTime = 0;
            sound.play();
            //console.log("done!");
        }
