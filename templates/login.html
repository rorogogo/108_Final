<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/sidebar.css">
    <script src="/static/music.js" defer></script>
    <title>Endfield Login</title>
</head>
<body class="auth-page">
    <main class="auth-card">
        <p class="page-kicker">Operator Access</p>
        <h1 class="auth-title">ENDFIELD</h1>

        <form action="/" method="post">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>

            <button class="primary-button" type="submit">Log In</button>
        </form>

        <a class="auth-link" href="/signup">Create account</a>
    </main>
    <button
        class="sound-toggle floating-mute"
        id="sound-muted-button"
        type="button"
        aria-label="Mute audio"
        aria-pressed="false"
        title="Mute audio"
    >
        <span class="speaker-icon" id="sound-muted-icon" aria-hidden="true"></span>
    </button>
    <script src="/static/sfx.js"></script>
</body>
</html>
